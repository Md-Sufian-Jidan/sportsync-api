basePath: /api/v1
definitions:
  dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  dto.UserResponse:
    properties:
      email:
        type: string
      id:
        type: integer
      name:
        type: string
      role:
        type: string
    type: object
  dto.ZoneResponse:
    properties:
      id:
        type: integer
      name:
        type: string
      price_per_hour:
        type: number
      total_capacity:
        type: integer
      type:
        type: string
    type: object
  httpResponse.Error:
    properties:
      errors: {}
      message:
        type: string
      success:
        type: boolean
    type: object
  httpResponse.Success:
    properties:
      data: {}
      message:
        type: string
      success:
        type: boolean
    type: object
  sportsync-api_internal_domain_admin_dto.CreateRequest:
    properties:
      name:
        type: string
      price_per_hour:
        type: number
      total_capacity:
        type: integer
      type:
        enum:
        - general
        - ev_charging
        - covered
        type: string
    required:
    - name
    - price_per_hour
    - total_capacity
    - type
    type: object
  sportsync-api_internal_domain_admin_dto.UpdateRequest:
    properties:
      name:
        type: string
      price_per_hour:
        type: number
      total_capacity:
        type: integer
      type:
        enum:
        - general
        - ev_charging
        - covered
        type: string
    required:
    - name
    - price_per_hour
    - total_capacity
    - type
    type: object
  sportsync-api_internal_domain_reservations_dto.CreateRequest:
    properties:
      license_plate:
        maxLength: 15
        type: string
      zone_id:
        type: integer
    required:
    - license_plate
    - zone_id
    type: object
  sportsync-api_internal_domain_reservations_dto.Response:
    properties:
      created_at:
        type: string
      id:
        type: integer
      license_plate:
        type: string
      status:
        type: string
      updated_at:
        type: string
      user:
        $ref: '#/definitions/dto.UserResponse'
      user_id:
        type: integer
      zone:
        $ref: '#/definitions/dto.ZoneResponse'
      zone_id:
        type: integer
    type: object
  sportsync-api_internal_domain_reservations_dto.UpdateRequest:
    properties:
      status:
        enum:
        - active
        - completed
        - cancelled
        type: string
    required:
    - status
    type: object
  sportsync-api_internal_domain_user_dto.CreateRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        minLength: 6
        type: string
      role:
        enum:
        - driver
        - admin
        type: string
    required:
    - email
    - name
    - password
    type: object
  sportsync-api_internal_domain_user_dto.Response:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      name:
        type: string
      role:
        type: string
      updated_at:
        type: string
    type: object
info:
  contact:
    email: support@spotsync.com
    name: SpotSync Team
  description: SpotSync Parking Management API
  license:
    name: MIT
  termsOfService: http://swagger.io/terms/
  title: SpotSync API
  version: "1.0"
paths:
  /:
    get:
      description: Health check endpoint
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
      tags:
      - health
  /auth/login:
    post:
      consumes:
      - application/json
      description: Login with email and password
      parameters:
      - description: Login Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpResponse.Success'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpResponse.Error'
      summary: Login User
      tags:
      - Authentication
  /auth/me:
    get:
      description: Returns the currently authenticated user's information
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/httpResponse.Success'
            - properties:
                data:
                  $ref: '#/definitions/sportsync-api_internal_domain_user_dto.Response'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpResponse.Error'
      security:
      - BearerAuth: []
      summary: Get authenticated user
      tags:
      - Authentication
  /auth/register:
    post:
      consumes:
      - application/json
      description: Register a new user
      parameters:
      - description: Register Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/sportsync-api_internal_domain_user_dto.CreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/httpResponse.Success'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpResponse.Error'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/httpResponse.Error'
      summary: Register User
      tags:
      - Authentication
  /reservations:
    get:
      description: Retrieve all reservations in the system (Admin only)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/httpResponse.Success'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/sportsync-api_internal_domain_reservations_dto.Response'
                  type: array
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpResponse.Error'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpResponse.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpResponse.Error'
      security:
      - BearerAuth: []
      summary: Get All Reservations
      tags:
      - Reservations
    post:
      consumes:
      - application/json
      description: Create a new parking reservation
      parameters:
      - description: Reservation Information
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/sportsync-api_internal_domain_reservations_dto.CreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/httpResponse.Success'
            - properties:
                data:
                  $ref: '#/definitions/sportsync-api_internal_domain_reservations_dto.Response'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpResponse.Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpResponse.Error'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/httpResponse.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpResponse.Error'
      security:
      - BearerAuth: []
      summary: Reserve Parking Spot
      tags:
      - Reservations
  /reservations/{id}:
    delete:
      description: Cancel an existing reservation. Drivers can only cancel their own
        reservations.
      parameters:
      - description: Reservation ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpResponse.Success'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpResponse.Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpResponse.Error'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpResponse.Error'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpResponse.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpResponse.Error'
      security:
      - BearerAuth: []
      summary: Cancel Reservation
      tags:
      - Reservations
    get:
      description: Get reservation details by reservation ID
      parameters:
      - description: Reservation ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/httpResponse.Success'
            - properties:
                data:
                  $ref: '#/definitions/sportsync-api_internal_domain_reservations_dto.Response'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpResponse.Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpResponse.Error'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpResponse.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpResponse.Error'
      security:
      - BearerAuth: []
      summary: Get Reservation By ID
      tags:
      - Reservations
    put:
      consumes:
      - application/json
      description: Update an existing reservation
      parameters:
      - description: Reservation ID
        in: path
        name: id
        required: true
        type: integer
      - description: Updated Reservation
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/sportsync-api_internal_domain_reservations_dto.UpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/httpResponse.Success'
            - properties:
                data:
                  $ref: '#/definitions/sportsync-api_internal_domain_reservations_dto.Response'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpResponse.Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpResponse.Error'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpResponse.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpResponse.Error'
      security:
      - BearerAuth: []
      summary: Update Reservation
      tags:
      - Reservations
  /reservations/my-reservations:
    get:
      description: Get all reservations of the authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/httpResponse.Success'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/sportsync-api_internal_domain_reservations_dto.Response'
                  type: array
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpResponse.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpResponse.Error'
      security:
      - BearerAuth: []
      summary: Get My Reservations
      tags:
      - Reservations
  /zones:
    get:
      description: Retrieve all parking zones
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpResponse.Success'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpResponse.Error'
      summary: Get All Parking Zones
      tags:
      - Parking Zones
    post:
      consumes:
      - application/json
      description: Create a new parking zone (Admin only)
      parameters:
      - description: Parking Zone
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/sportsync-api_internal_domain_admin_dto.CreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/httpResponse.Success'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpResponse.Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpResponse.Error'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpResponse.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpResponse.Error'
      security:
      - BearerAuth: []
      summary: Create Parking Zone
      tags:
      - Parking Zones
  /zones/{id}:
    delete:
      description: Delete a parking zone (Admin only)
      parameters:
      - description: Parking Zone ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpResponse.Success'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpResponse.Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpResponse.Error'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpResponse.Error'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpResponse.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpResponse.Error'
      security:
      - BearerAuth: []
      summary: Delete Parking Zone
      tags:
      - Parking Zones
    get:
      description: Retrieve a parking zone by ID
      parameters:
      - description: Parking Zone ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpResponse.Success'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpResponse.Error'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpResponse.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpResponse.Error'
      summary: Get Parking Zone
      tags:
      - Parking Zones
    put:
      consumes:
      - application/json
      description: Update an existing parking zone (Admin only)
      parameters:
      - description: Parking Zone ID
        in: path
        name: id
        required: true
        type: integer
      - description: Parking Zone
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/sportsync-api_internal_domain_admin_dto.UpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpResponse.Success'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpResponse.Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpResponse.Error'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpResponse.Error'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpResponse.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpResponse.Error'
      security:
      - BearerAuth: []
      summary: Update Parking Zone
      tags:
      - Parking Zones
schemes:
- http
securityDefinitions:
  BearerAuth:
    description: Type "Bearer" followed by a space and JWT token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
